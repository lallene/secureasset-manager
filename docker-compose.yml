services:
  api:
    build: .
    container_name: secureasset_api
    ports:
      - "8080:8080"
    env_file:
      - .env
    depends_on:
      - postgres

  postgres:
    image: postgres:16
    container_name: secureasset_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: secureasset_db
    ports:
      - "5434:5432"
    volumes:
      - secureasset_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    container_name: secureasset_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@secureasset.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres

volumes:
  secureasset_data: